<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대상정보 | D-Guard</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./shared.css">
  <link rel="stylesheet" href="./inspection-target-detail.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar card" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <span class="sidebar-logo">DG</span>
          <div class="sidebar-brand-text">
            <strong>D-Guard</strong>
            <span>DB Scan</span>
          </div>
        </div>
        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-expanded="true" aria-label="사이드바 접기">&lt;</button>
      </div>
      <nav class="sidebar-nav" aria-label="주요 메뉴"></nav>
      <div class="sidebar-footer">
        <span class="sidebar-footer-label">테스트용</span>
        <div class="role-switch" aria-label="역할 선택">
          <button type="button" class="role-btn is-active" data-role="admin">관리자</button>
          <button type="button" class="role-btn" data-role="user">일반사용자</button>
        </div>
      </div>
    </aside>

    <div class="page-shell">
      <header class="hero-card card">
        <div>
          <h1>대상정보 <span class="hero-target" id="detailHeroTarget">선택 DB</span></h1>
          <nav class="breadcrumb" aria-label="breadcrumb">
            <a href="./inspection-target.html" class="breadcrumb-link">점검대상</a>
            <span class="breadcrumb-separator">&gt;</span>
            <a href="#" class="breadcrumb-link" id="detailBreadcrumbName">대상정보</a>
            <span class="breadcrumb-separator">&gt;</span>
            <a href="#" class="breadcrumb-link is-current" aria-current="page">대상정보</a>
          </nav>
        </div>
        <div class="user-menu" id="userMenu">
          <button type="button" class="user-menu-trigger" id="userMenuTrigger" aria-expanded="false" aria-haspopup="true">
            김성진(5492438)
            <svg class="user-menu-caret" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true" focusable="false" style="vertical-align: middle;">
              <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="user-menu-panel" id="userMenuPanel" hidden>
            <button type="button" class="user-menu-item" id="userSettingsButton">사용자설정</button>
            <button type="button" class="user-menu-item danger" id="logoutButton">로그아웃</button>
          </div>
        </div>
      </header>

      <main class="detail-workspace">
        <section class="card section-card detail-summary-strip">
          <div class="summary-tile">
            <span>DB종류</span>
            <strong id="detailDbType">-</strong>
          </div>
          <div class="summary-tile">
            <span>점검상태</span>
            <strong id="detailStatusText">-</strong>
          </div>
          <div class="summary-tile">
            <span>최근검색테이블수</span>
            <strong id="detailTableCount">0</strong>
          </div>
          <div class="summary-tile">
            <span>최근검출건수</span>
            <strong id="detailDetectionCount">0</strong>
          </div>
        </section>

        <section class="detail-grid-layout">
          <section class="card section-card">
            <div class="detail-header">
              <div>
                <h3>기본정보</h3>
              </div>
              <div class="detail-actions">
                <a class="ghost-btn detail-link-btn" id="openDetectionListLink" href="./detection-list.html">검출목록</a>
                <a class="ghost-btn detail-link-btn" href="./inspection-target.html">목록으로</a>
              </div>
            </div>
            <div class="detail-grid info-grid">
              <div class="detail-field">
                <span>DB명</span>
                <strong id="infoName">-</strong>
              </div>
              <div class="detail-field">
                <span>서비스명</span>
                <strong id="infoServiceName">-</strong>
              </div>
              <div class="detail-field">
                <span>호스트</span>
                <strong id="infoHost">-</strong>
              </div>
              <div class="detail-field">
                <span>인스턴스</span>
                <strong id="infoInstance">-</strong>
              </div>
              <div class="detail-field">
                <span>운영팀</span>
                <strong id="infoOwnerTeam">-</strong>
              </div>
              <div class="detail-field">
                <span>최근점검시작</span>
                <strong id="infoStartedAt">-</strong>
              </div>
              <div class="detail-field full-span">
                <span>설명</span>
                <strong id="infoDescription">-</strong>
              </div>
            </div>
          </section>

          <section class="card section-card">
            <div class="detail-header">
              <div>
                <h3>라벨 및 운영메모</h3>
              </div>
              <div class="detail-actions">
                <a class="primary-btn detail-link-btn" id="openRunPageLink" href="./inspection-run.html">점검페이지</a>
              </div>
            </div>
            <div class="label-section">
              <span>등록 라벨</span>
              <div class="label-chip-wrap" id="detailLabelList"></div>
            </div>
            <div class="context-block detail-note-block">
              <span>운영 메모</span>
              <ul id="detailNotes"></ul>
            </div>
          </section>
        </section>
      </main>
    </div>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

  <script src="./shared.js"></script>
  <script src="./mock-inspection-target-service.js"></script>
  <script src="./inspection-target-detail.js"></script>
</body>
</html>
