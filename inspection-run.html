<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>점검 스케줄 설정 | D-Guard</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./shared.css">
  <link rel="stylesheet" href="./inspection-run.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar card" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <span class="sidebar-logo">DG</span>
          <div class="sidebar-brand-text">
            <strong>D-Guard</strong>
            <span>DB Scan</span>
          </div>
        </div>
        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-expanded="true" aria-label="사이드바 접기">&lt;</button>
      </div>
      <nav class="sidebar-nav" aria-label="주요 메뉴"></nav>
      <div class="sidebar-footer">
        <span class="sidebar-footer-label">테스트용</span>
        <div class="role-switch" aria-label="역할 선택">
          <button type="button" class="role-btn is-active" data-role="admin">관리자</button>
          <button type="button" class="role-btn" data-role="user">일반사용자</button>
        </div>
      </div>
    </aside>

    <div class="page-shell">
      <header class="hero-card card">
        <div>
          <h1>점검 스케줄 설정</h1>
          <nav class="breadcrumb" aria-label="breadcrumb">
            <a href="./inspection-target.html" class="breadcrumb-link">점검대상</a>
            <span class="breadcrumb-separator">&gt;</span>
            <a href="#" class="breadcrumb-link is-current" aria-current="page">선택 DB 스케줄 설정</a>
          </nav>
        </div>
        <div class="user-menu" id="userMenu">
          <button type="button" class="user-menu-trigger" id="userMenuTrigger" aria-expanded="false" aria-haspopup="true">
            김성진(5492438)
            <svg class="user-menu-caret" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
          <div class="user-menu-panel" id="userMenuPanel" hidden>
            <button type="button" class="user-menu-item" id="userSettingsButton">사용자설정</button>
            <button type="button" class="user-menu-item danger" id="logoutButton">로그아웃</button>
          </div>
        </div>
      </header>

      <main class="run-page">
        <section class="card section-card run-summary-card">
          <div class="run-summary-head">
            <div>
              <h3>이동 안내</h3>
              <p class="section-caption">선택한 DB만 대상으로 스케줄을 설정합니다.</p>
            </div>
            <strong class="run-selection-count" id="selectedTargetCount">0대 선택</strong>
          </div>
          <div class="run-guide-box">
            <p>선택 대상 전용 점검 스케줄을 등록할 수 있습니다.</p>
          </div>
        </section>

        <section class="card section-card run-form-card">
          <div class="detail-header">
            <div>
              <h3>스케줄 기본정보</h3>
            </div>
          </div>
          <div class="run-form-grid">
            <label class="form-group">
              <span>스케줄명</span>
              <input type="text" id="scheduleNameInput" placeholder="예: 야간 개인정보 정기점검">
            </label>
            <label class="form-group">
              <span>실행주기</span>
              <select id="scheduleCycleSelect">
                <option>매일</option>
                <option>매주</option>
                <option>매월</option>
                <option>수동</option>
              </select>
            </label>
            <label class="form-group">
              <span>시작일시</span>
              <input type="datetime-local" id="scheduleStartInput">
            </label>
            <label class="form-group run-form-wide">
              <span>동작 설명</span>
              <textarea id="vendorMessageInput" rows="4" placeholder="업체에 전달할 점검 목적과 일정 설명을 입력하세요."></textarea>
            </label>
          </div>
          <div class="run-form-actions">
            <button type="button" class="ghost-btn" id="backToTargetButton">목록으로</button>
            <button type="button" class="primary-btn" id="saveScheduleButton">스케줄 저장</button>
          </div>
        </section>

        <section class="card section-card run-target-card">
          <div class="detail-header">
            <div>
              <h3>선택 DB</h3>
            </div>
          </div>
          <div class="table-shell run-target-table-shell">
            <table class="data-table run-target-table">
              <colgroup>
                <col style="width:10%">
                <col style="width:26%">
                <col style="width:12%">
                <col style="width:18%">
                <col style="width:10%">
                <col style="width:12%">
                <col style="width:12%">
              </colgroup>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>DB명</th>
                  <th class="center-cell">DB종류</th>
                  <th>최근스케쥴명</th>
                  <th class="number-cell">최근검색테이블수</th>
                  <th class="center-cell">최근점검상태</th>
                  <th>라벨</th>
                </tr>
              </thead>
              <tbody id="runTargetTableBody"></tbody>
            </table>
            <div class="empty-state" id="runTargetEmpty" hidden>선택된 DB가 없습니다.</div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

  <script src="./shared.js"></script>
  <script src="./mock-inspection-target-service.js"></script>
  <script src="./inspection-run.js"></script>
</body>
</html>
